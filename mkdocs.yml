# desde el codigo# 
site_name: Q.Roman
Site_url: https://wattbucket.com/
docs_dir: 'docs'
copyright: Copyright &copy; 2023 Watt Bucket
theme:
  logo:  assets/logo.png
  favicon: assets/logo.png
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: orange
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.prune
    - navigation.top
    - content.code.annotate
  language: es
extra:
  social:
    - icon: fontawesome/solid/paper-plane
      link: mailto:info@wattbucket.com?subject=Contacto blog Watt bucket&body=dsafasd
    - icon: fontawesome/solid/phone
      link: tel:+34 600366211

  analytics:
    provider: google
    property: G-XXXXXXXXX

  consent:
    title:  Consentimiento de Cookies
    description: >- 
      Utilizamos cookies para reconocer sus visitas repetidas y preferencias, así como
       como para medir la eficacia de nuestra documentación y si los usuarios
       encuentran lo que están buscando. Con su consentimiento, nos está ayudando a
       mejorar nuestra documentación.
    cookies:
      analytics:
        name: Google Analytics
        checked: true
    actions:
      - accept
      - reject      
  alternate:
    - name: Espanol
      link: /
      lang: es
    - name: English
      link: /en/ 
      lang: en
    - name: Deutsch
      link: /de/
      lang: de
markdown_extensions:
  - footnotes
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true

  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js


plugins:
  - git-revision-date          
  - mkdocstrings
  - search
    
  - toc-md:
      toc_page_title: Oficina Tecnica ![](https://github.com/asolear/assets/blob/master/imgs/cabecerag.png?raw=true)

      toc_page_description:! 
        [](https://github.com/asolear/assets/blob/master/imgs/cabecerag.png?raw=true)


        <center><h1 style="color:orange;  
          font-size: large">Oficina Técnica de Autoconsumo</h1></center>
        <center><p style="color:red;  
          font-size: xx-small"> :fontawesome-solid-file-pen:.- Documentos a medida</p></center>


        <style>
        body {
            /* background-image: url('Wavy_REst-03_Single-07.jpg');  */
            /* background-image: url('assets/images/logo.svg');  */
            /* background-image: url('image/Peek 2023-01-05 19-19.gif');  */
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            background-size: 100% 100%; 
            }
        </style>
      header_level: 3
      pickup_description_meta: false
      pickup_description_class: false
      output_path: index.md
      output_log: false
      ignore_page_pattern: index.*.md$
      remove_navigation_page_pattern: index.*.md$
      template_dir_path: custom_template
      integrate_mkdocs_static_i18n: true
      languages:
        en:
          toc_page_title: Contents
          toc_page_description: Usage mkdocs-toc-md
        ja:
          toc_page_title: 目次
          toc_page_description: mkdocs-toc-mdプラグインの使い方
      shift_header: after_h1_of_index
      extend_module: true
      output_comment: html


