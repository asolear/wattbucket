# desde el codigo# 
site_name: Q.Roman
Site_url: https://wattbucket.com
docs_dir: 'docs'
copyright: Copyright &copy; 2023 Watt Bucket
theme:
  logo:  Anexos/assets/logo.png
  favicon: Anexos/assets/logo.png
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: orange
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.prune
    - navigation.top
    - content.code.annotate
  
extra:
  social:
    - icon: fontawesome/solid/paper-plane
      link: mailto:info@wattbucket.com?subject=Contacto blog Watt bucket&body=dsafasd
    - icon: fontawesome/solid/phone
      link: tel:+34 600366211

  analytics:
    provider: google
    property: G-XXXXXXXXX

  consent:
    title:  Consentimiento de Cookies
    description: >- 
      Utilizamos cookies para reconocer sus visitas repetidas y preferencias, así como
       como para medir la eficacia de nuestra documentación y si los usuarios
       encuentran lo que están buscando. Con su consentimiento, nos está ayudando a
       mejorar nuestra documentación.
    cookies:
      analytics:
        name: Google Analytics
        checked: true
    actions:
      - accept
      - reject      
  alternate:
    - name: Espanol
      link: /
      lang: es
    - name: English
      link: /en/ 
      lang: en
    - name: Deutsch
      link: /de/
      lang: de
markdown_extensions:
  - footnotes
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true

  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js


plugins:
  - git-revision-date          
  - mkdocstrings
  - search



