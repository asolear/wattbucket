# desde el codigo# 
site_name: WattBucket
Site_url: https://wattbucket.com
docs_dir: 'docs'
copyright: Copyright &copy; 2023 Watt Bucket
theme:
  logo:  assets/images/logo.svg
  favicon: assets/images/logo.svg
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: orange
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.prune
    - navigation.top
    - content.code.annotate
  
extra:
  social:
    - icon: fontawesome/solid/paper-plane
      link: mailto:info@wattbucket.com?subject=Contacto blog Watt bucket&body=dsafasd
    - icon: fontawesome/solid/phone
      link: tel:+34 600366211

  analytics:
    provider: google
    property: G-XXXXXXXXX

  consent:
    title:  Consentimiento de Cookies
    description: >- 
      Utilizamos cookies para reconocer sus visitas repetidas y preferencias, así como
       como para medir la eficacia de nuestra documentación y si los usuarios
       encuentran lo que están buscando. Con su consentimiento, nos está ayudando a
       mejorar nuestra documentación.
    cookies:
      analytics:
        name: Google Analytics
        checked: true
    actions:
      - accept
      - reject      

markdown_extensions:
  - footnotes
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true

  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
      
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js


plugins:
  - git-revision-date          
  - mkdocstrings
  - search
  - i18n:
      default_language: en
      default_language_only: false
      languages:
        en:
          name: English
          build: true
        es:
          name: Spanish
          build: true
      nav_translations:
        es:
          About this manual: Acerca de este manual
          Access configuration : Configuracion de acceso

nav:

    - Proyectos: 
        - Autoconsumo Nave Industrial: Anexos/000_Proyectos_Autoconsumo Nave Industrial.md 
        - Autoconsumo Residencial en Bloque de Pisos: Anexos/000_Proyectos_Autoconsumo Residencial en Bloque de Pisos.md 
        - Autoconsumo Sistema de Bombeo: Anexos/000_Proyectos_Autoconsumo Sistema de Bombeo.md 
    - desarrollo: 
        - planos2tabla: Anexos/000_desarrollo_planos2tabla.md 
        - planos2fig: Anexos/000_desarrollo_planos2fig.md 
    - Estudios: 
        - Diseño del sistema eléctrico: Anexos/000_Estudios_Diseño del sistema eléctrico.md 
        - Dimensionado del sistema: Anexos/000_Estudios_Dimensionado del sistema.md 
        - Estudio económico: Anexos/000_Estudios_Estudio económico.md 
    - Calculos: 
        - DECLARACIÓN RESPONSABLE del consumo: Anexos/111_Calculos_DECLARACIÓN RESPONSABLE del consumo.md 
        - Informe justificativo de consumo: Anexos/111_Calculos_Informe justificativo de consumo.md 
        - Distancia mínima entre filas de módulos: Anexos/111_Calculos_Distancia mínima entre filas de módulos.md
